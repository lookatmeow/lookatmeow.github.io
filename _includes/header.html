<header style="padding: 1rem 1.25rem; border-bottom: 1px solid #e5e7eb;">
  <nav style="max-width: 960px; margin: 0 auto; display: flex; gap: 1rem; align-items: center; justify-content: space-between;">
    <strong><a href="{{ '/' | relative_url }}" style="text-decoration: none; color: inherit;">{{ site.title }}</a></strong>
    <div style="display: flex; gap: 1rem;">
      {% for item in site.data.navigation.main %}
        <a href="{{ item.url | relative_url }}" style="text-decoration: none; color: inherit;">{{ item.title }}</a>
      {% endfor %}
    </div>
  </nav>
</header>
