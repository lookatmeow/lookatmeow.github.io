<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LookatMe | Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif']
          },
          colors: {
            primary: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e'
            }
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-black text-gray-900 dark:text-white transition-colors duration-300 min-h-screen">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-20 -left-20 w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-20 animate-float"></div>
    <div class="absolute top-40 right-20 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-20 animate-float" style="animation-delay: 2s;"></div>
  </div>

  <nav class="fixed top-0 left-0 right-0 z-50 glass-card">
    <div class="container mx-auto px-4 py-4 flex items-center justify-between">
      <a href="./index.html" class="flex items-center space-x-3">
        <i class="fas fa-glasses text-3xl brand-icon-gold"></i>
        <span class="text-2xl font-bold bg-gradient-to-r from-primary-500 via-purple-500 to-pink-500 bg-clip-text text-transparent">LookatMe</span>
      </a>
      <div class="flex items-center gap-3">
        <a href="./index.html" class="px-3 py-2 rounded-lg glass-card smooth-transition hover:bg-primary-500 hover:text-white text-sm" data-en="Shop" data-es="Tienda">Shop</a>
        <button id="langToggle" class="px-3 py-1 rounded-lg glass-card smooth-transition hover:bg-primary-500 hover:text-white text-sm font-semibold">EN / ES</button>
        <button id="themeToggle" class="p-2 rounded-lg glass-card smooth-transition hover:bg-primary-500 hover:text-white">
          <i class="fas fa-moon dark:hidden"></i>
          <i class="fas fa-sun hidden dark:inline"></i>
        </button>
      </div>
    </div>
  </nav>

  <main class="pt-28 pb-16 px-4">
    <section class="max-w-6xl mx-auto">
      <div class="text-center mb-10">
        <p class="text-sm uppercase tracking-[0.3em] text-primary-500 font-semibold" data-en="Customer Zone" data-es="Zona de Cliente">Customer Zone</p>
        <h1 class="text-4xl md:text-5xl font-bold mb-3">
          <span class="bg-gradient-to-r from-primary-500 via-purple-500 to-pink-500 bg-clip-text text-transparent" data-en="Your Profile" data-es="Tu Perfil">Your Profile</span>
        </h1>
        <p class="text-gray-600 dark:text-gray-400 max-w-3xl mx-auto" data-en="Manage your personal information, orders, security, and preferences." data-es="Administra tus datos personales, pedidos, seguridad y preferencias.">Manage your personal information, orders, security, and preferences.</p>
      </div>

      <div id="accountDashboard" class="space-y-6 glass-card rounded-3xl p-6 md:p-10">
        <div class="glass-card rounded-2xl p-5 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
          <div>
            <p class="text-sm text-gray-600 dark:text-gray-400" data-en="Signed in as" data-es="Sesion iniciada como">Signed in as</p>
            <h3 id="accountGreeting" class="text-2xl font-semibold">-</h3>
            <p id="accountEmail" class="text-sm text-primary-500">-</p>
          </div>
          <button id="accountLogoutBtn" type="button" class="px-4 py-2 rounded-lg border border-red-500 text-red-500 hover:bg-red-500 hover:text-white smooth-transition">
            <i class="fas fa-right-from-bracket mr-2"></i>
            <span data-en="Sign out" data-es="Cerrar sesion">Sign out</span>
          </button>
        </div>

        <div class="flex flex-wrap gap-3">
          <button type="button" data-account-tab="personal" class="account-tab-btn px-4 py-2 rounded-xl glass-card bg-primary-500 text-white smooth-transition" data-en="Personal Info" data-es="Datos Personales">Personal Info</button>
          <button type="button" data-account-tab="pending" class="account-tab-btn px-4 py-2 rounded-xl glass-card smooth-transition" data-en="Pending Orders" data-es="Pedidos Pendientes">Pending Orders</button>
          <button type="button" data-account-tab="history" class="account-tab-btn px-4 py-2 rounded-xl glass-card smooth-transition" data-en="Buying History" data-es="Historial de Compras">Buying History</button>
          <button type="button" data-account-tab="security" class="account-tab-btn px-4 py-2 rounded-xl glass-card smooth-transition" data-en="Security" data-es="Seguridad">Security</button>
          <button type="button" data-account-tab="prefs" class="account-tab-btn px-4 py-2 rounded-xl glass-card smooth-transition" data-en="Preferences" data-es="Preferencias">Preferences</button>
        </div>

        <div id="accountTab-personal" class="account-tab-panel">
          <form id="personalInfoForm" class="glass-card rounded-2xl p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="profileName" class="block text-sm mb-1" data-en="Full name" data-es="Nombre completo">Full name</label>
              <input id="profileName" type="text" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-300 dark:border-gray-700 focus:border-primary-500 focus:outline-none smooth-transition" />
            </div>
            <div>
              <label for="profilePhone" class="block text-sm mb-1" data-en="Phone" data-es="Telefono">Phone</label>
              <input id="profilePhone" type="tel" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-300 dark:border-gray-700 focus:border-primary-500 focus:outline-none smooth-transition" />
            </div>
            <div>
              <label for="profileAddress" class="block text-sm mb-1" data-en="Address" data-es="Direccion">Address</label>
              <input id="profileAddress" type="text" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-300 dark:border-gray-700 focus:border-primary-500 focus:outline-none smooth-transition" />
            </div>
            <div>
              <label for="profileCity" class="block text-sm mb-1" data-en="City" data-es="Ciudad">City</label>
              <input id="profileCity" type="text" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-300 dark:border-gray-700 focus:border-primary-500 focus:outline-none smooth-transition" />
            </div>
            <div class="md:col-span-2">
              <label for="profileCountry" class="block text-sm mb-1" data-en="Country" data-es="Pais">Country</label>
              <input id="profileCountry" type="text" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-300 dark:border-gray-700 focus:border-primary-500 focus:outline-none smooth-transition" />
            </div>
            <div class="md:col-span-2">
              <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-primary-500 to-purple-500 text-white smooth-transition hover:scale-105">
                <span data-en="Save personal info" data-es="Guardar datos personales">Save personal info</span>
              </button>
            </div>
          </form>
        </div>

        <div id="accountTab-pending" class="account-tab-panel hidden">
          <div id="pendingOrdersList" class="space-y-3"></div>
        </div>

        <div id="accountTab-history" class="account-tab-panel hidden">
          <div id="orderHistoryList" class="space-y-3"></div>
        </div>

        <div id="accountTab-security" class="account-tab-panel hidden">
          <form id="securityForm" class="glass-card rounded-2xl p-6 grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2">
              <label for="currentPassword" class="block text-sm mb-1" data-en="Current password" data-es="Contrasena actual">Current password</label>
              <input id="currentPassword" type="password" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-300 dark:border-gray-700 focus:border-primary-500 focus:outline-none smooth-transition" required />
            </div>
            <div>
              <label for="newPassword" class="block text-sm mb-1" data-en="New password" data-es="Nueva contrasena">New password</label>
              <input id="newPassword" type="password" minlength="8" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-300 dark:border-gray-700 focus:border-primary-500 focus:outline-none smooth-transition" required />
            </div>
            <div>
              <label for="confirmNewPassword" class="block text-sm mb-1" data-en="Confirm new password" data-es="Confirmar nueva contrasena">Confirm new password</label>
              <input id="confirmNewPassword" type="password" minlength="8" class="w-full px-4 py-2 rounded-lg bg-white/10 border border-gray-300 dark:border-gray-700 focus:border-primary-500 focus:outline-none smooth-transition" required />
            </div>
            <div class="md:col-span-2">
              <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-primary-500 to-purple-500 text-white smooth-transition hover:scale-105">
                <span data-en="Change password" data-es="Cambiar contrasena">Change password</span>
              </button>
            </div>
          </form>
        </div>

        <div id="accountTab-prefs" class="account-tab-panel hidden">
          <form id="prefsForm" class="glass-card rounded-2xl p-6 space-y-4">
            <label class="flex items-start gap-3">
              <input id="newsletterOptIn" type="checkbox" class="mt-1 w-5 h-5 rounded border-gray-300 text-primary-500 focus:ring-primary-500" />
              <span>
                <strong data-en="Join newsletter" data-es="Unirme al boletin">Join newsletter</strong><br />
                <span class="text-sm text-gray-600 dark:text-gray-400" data-en="Receive launch alerts, special drops, and personalized promos." data-es="Recibe alertas de lanzamientos, drops especiales y promos personalizadas.">Receive launch alerts, special drops, and personalized promos.</span>
              </span>
            </label>
            <label class="flex items-start gap-3">
              <input id="orderUpdatesOptIn" type="checkbox" class="mt-1 w-5 h-5 rounded border-gray-300 text-primary-500 focus:ring-primary-500" checked />
              <span>
                <strong data-en="Order status emails" data-es="Correos de estado de pedido">Order status emails</strong><br />
                <span class="text-sm text-gray-600 dark:text-gray-400" data-en="Get automatic updates when your order changes status." data-es="Recibe actualizaciones automaticas cuando cambia tu pedido.">Get automatic updates when your order changes status.</span>
              </span>
            </label>
            <button type="submit" class="px-5 py-2 rounded-lg bg-gradient-to-r from-primary-500 to-purple-500 text-white smooth-transition hover:scale-105">
              <span data-en="Save preferences" data-es="Guardar preferencias">Save preferences</span>
            </button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./dist/main.js"></script>
</body>
</html>
